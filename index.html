<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Breezy</title>

  <link rel="icon" href="./Images/favicon/favicon.png" type="image/x-icon">

  <!-- Main CSS -->
  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="./src/styles/research.css">
  <link rel="stylesheet" href="/src/styles/navbar.css">

  <!-- Boxicons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  

  <!-- jQuery (must be before component scripts) -->

  <!-- Hero (includes brand carousel) -->

  <!-- Vehicles -->
  <div id="car-listing-component"></div>

  <!-- About Us -->
  <div id="about-component"></div>

  <!-- Services -->

  <!-- Brands -->

  <!-- Contact Us -->
  <div id="contact-component"></div>

  <div id="carbreezy-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>AOS.init();</script>

  <!-- Components (navbar first, then hero, then rest) -->
   
 
  <script src="./src/Components/navbar.js"></script>
  <script src="./src/Components/research.js"></script> 
  <script src="./src/Components/hero.js"></script>
  <script src="./src/Components/Carlisting.js"></script>
  <script src="./src/Components/services.js"></script>
  <script src="./src/Components/about.js"></script>
  <script src="./src/Components/brands.js"></script>
  <script src="./src/Components/contact.js"></script>
